<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 사주 운세 BY 조지 도사</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #B8860B;
      --gold-dark: #8B6914;
      --gold-light: #FFF8DC;
      --bg: #0e0c09;
      --bg2: #1a1710;
      --bg3: #231f14;
      --border: rgba(184,134,11,0.2);
      --border2: rgba(184,134,11,0.4);
      --text: #f0e8d5;
      --text2: #a89870;
      --text3: #6b5f45;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .bg-deco {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-deco::before {
      content: '';
      position: absolute;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(184,134,11,0.06) 0%, transparent 70%);
    }

    .container { position: relative; z-index: 1; width: 100%; max-width: 540px; }

    .header { text-align: center; padding: 2.5rem 0 2rem; }

    .header-badge {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--gold);
      border: 0.5px solid var(--border2);
      padding: 5px 16px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text);
      line-height: 1.3;
    }

    .header h1 em { font-style: normal; color: var(--gold); }

    .gold-line {
      width: 50px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 16px auto 12px;
    }

    .header p { font-size: 13px; color: var(--text2); letter-spacing: 0.06em; }

    .card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 12px;
      letter-spacing: 0.18em;
      color: var(--gold);
      margin-bottom: 1.25rem;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .input-group { display: flex; flex-direction: column; gap: 6px; }

    label { font-size: 11px; color: var(--text2); letter-spacing: 0.1em; }

    input, select {
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 11px 13px;
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    input:focus, select:focus { border-color: var(--gold); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--gold-dark);
      color: var(--gold-light);
      border: none;
      border-radius: 10px;
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 6px;
    }

    .btn:hover { background: #9A7520; }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; }

    .pillars {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .pillar {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
    }

    .pillar-label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; margin-bottom: 8px; }
    .pillar-gan { font-family: 'Noto Serif KR', serif; font-size: 24px; color: var(--gold); font-weight: 700; line-height: 1; }
    .pillar-ji { font-family: 'Noto Serif KR', serif; font-size: 24px; color: var(--text); font-weight: 600; line-height: 1; margin-top: 5px; }

    .today-label { text-align: center; font-size: 12px; color: var(--text2); letter-spacing: 0.08em; margin-bottom: 1rem; }

    .loading { text-align: center; padding: 2.5rem; display: none; }

    .dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 14px; }

    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); animation: bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.55); opacity: 0.35; }
      40% { transform: scale(1); opacity: 1; }
    }

    .loading p { font-size: 13px; color: var(--text2); letter-spacing: 0.08em; }

    .fortune-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .fortune-card-header {
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.12em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fortune-body { font-size: 14px; line-height: 1.9; color: var(--text); }

    .fortune-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .fortune-mini {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .mini-label { font-size: 11px; color: var(--text2); letter-spacing: 0.08em; margin-bottom: 6px; }

    .stars { display: flex; gap: 3px; margin-bottom: 5px; }
    .star { color: var(--gold); font-size: 13px; }
    .star.off { color: var(--text3); }

    .mini-text { font-size: 12px; color: var(--text2); line-height: 1.5; }
    .lucky-val { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; color: var(--gold); margin-top: 4px; }

    .error {color: var(--text); background: rgba(255,255,255,0.08);
      font-size: 13px;
      
      
      border-radius: 8px;
      padding: 10px 13px;
      margin-top: 10px;
      display: none;
    }

    #result { display: none; }

    .footer { text-align: center; font-size: 11px; color: var(--text3); margin-top: 2rem; letter-spacing: 0.05em; }

    @media (max-width: 400px) {
      .input-grid { grid-template-columns: 1fr; }
      .pillars { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="bg-deco"></div>
  <div class="container">

    <header class="header">
      <div class="header-badge">DAILY FORTUNE</div>
      <h1>오늘의 <em>사주</em> 운세</h1>
      <div style="font-family:'Noto Serif KR',serif;font-size:13px;color:var(--gold);letter-spacing:0.2em;margin-top:6px;">BY 조지 도사</div>
      <div class="gold-line"></div>
      <p>생년월일시로 알아보는 오늘의 기운</p>
    </header>

    <div class="card">
      <div class="card-title">▸ 생년월일 정보 입력</div>
      <div class="input-grid">
        <div class="input-group">
          <label for="inp-name">이름 (선택)</label>
          <input type="text" id="inp-name" placeholder="홍길동">
        </div>
        <div class="input-group">
          <label for="inp-gender">성별</label>
          <select id="inp-gender">
            <option value="남성">남성</option>
            <option value="여성">여성</option>
          </select>
        </div>
      </div>
      <div class="input-grid">
        <div class="input-group">
          <label for="inp-date">생년월일</label>
          <input type="date" id="inp-date" value="1990-01-01">
        </div>
        <div class="input-group">
          <label for="inp-hour">태어난 시간</label>
          <select id="inp-hour">
            <option value="모름">모름</option>
            <option value="자시(23~01시)">자시 (23~01시)</option>
            <option value="축시(01~03시)">축시 (01~03시)</option>
            <option value="인시(03~05시)">인시 (03~05시)</option>
            <option value="묘시(05~07시)">묘시 (05~07시)</option>
            <option value="진시(07~09시)">진시 (07~09시)</option>
            <option value="사시(09~11시)">사시 (09~11시)</option>
            <option value="오시(11~13시)">오시 (11~13시)</option>
            <option value="미시(13~15시)">미시 (13~15시)</option>
            <option value="신시(15~17시)">신시 (15~17시)</option>
            <option value="유시(17~19시)">유시 (17~19시)</option>
            <option value="술시(19~21시)">술시 (19~21시)</option>
            <option value="해시(21~23시)">해시 (21~23시)</option>
          </select>
        </div>
      </div>
      <button class="btn" id="btn-run" onclick="run()">사주 풀어보기</button>
      <div class="error" id="error"></div>
    </div>

    <div id="result">
      <div class="today-label" id="today-label"></div>
      <div class="pillars" id="pillars"></div>
      <div class="loading" id="loading">
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <p>사주를 해석하는 중입니다...</p>
      </div>
      <div id="fortune"></div>
    </div>

    <footer class="footer">본 서비스는 AI가 생성하는 운세이며 오락 목적으로 제공됩니다.</footer>
  </div>

  <script>
    const TODAY = new Date();
    const GAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
    const JI  = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];

    function gz(n) { return { g: GAN[((n-4)%10+10)%10], j: JI[((n-4)%12+12)%12] }; }

    function todayStr() {
      const d = ['일','월','화','수','목','금','토'];
      return `${TODAY.getFullYear()}년 ${TODAY.getMonth()+1}월 ${TODAY.getDate()}일 (${d[TODAY.getDay()]}요일)`;
    }

    function renderPillars(birth) {
      const [y, m, d] = birth.split('-').map(Number);
      const yGZ = gz(y);
      const mGZ = gz(y * 12 + m);
      const base = Math.floor((new Date(y,m-1,d) - new Date(1900,0,1)) / 86400000);
      const dGZ = gz(base + 1900);
      const tGZ = gz(Math.floor((TODAY - new Date(1900,0,1)) / 86400000) + 1900);

      const ps = [
        { label: '연주 (년)', ...yGZ },
        { label: '월주 (월)', ...mGZ },
        { label: '일주 (일)', ...dGZ },
        { label: '오늘 일진', ...tGZ },
      ];

      document.getElementById('pillars').innerHTML = ps.map(p => `
        <div class="pillar">
          <div class="pillar-label">${p.label}</div>
          <div class="pillar-gan">${p.g}</div>
          <div class="pillar-ji">${p.j}</div>
        </div>
      `).join('');
    }

    function stars(n) {
      return Array.from({length:5}, (_,i) => `<span class="star${i<n?'':' off'}">★</span>`).join('');
    }

    function showErr(msg) { const el = document.getElementById('error'); el.textContent = msg; el.style.display = 'block'; }
    function hideErr() { document.getElementById('error').style.display = 'none'; }

    async function run() {
      const name   = document.getElementById('inp-name').value.trim();
      const gender = document.getElementById('inp-gender').value;
      const birth  = document.getElementById('inp-date').value;
      const hour   = document.getElementById('inp-hour').value;

      if (!birth) { showErr('생년월일을 입력해 주세요.'); return; }
      hideErr();

      document.getElementById('btn-run').disabled = true;
      document.getElementById('result').style.display = 'block';
      document.getElementById('today-label').textContent = `오늘 ${todayStr()}`;
      renderPillars(birth);
      document.getElementById('loading').style.display = 'block';
      document.getElementById('fortune').innerHTML = '';

      try {
        const res = await fetch('/api/fortune', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, gender, birth, hour })
        });

        const parsed = await res.json();
        if (!res.ok) throw new Error(parsed.error || '오류가 발생했습니다.');

        document.getElementById('loading').style.display = 'none';

        const cats = [
          { key:'love',   label:'애정운' },
          { key:'money',  label:'금전운' },
          { key:'health', label:'건강운' },
          { key:'career', label:'직업운' },
        ];

        document.getElementById('fortune').innerHTML = `
          <div class="fortune-card">
            <div class="fortune-card-header">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              오늘의 종합 운세
            </div>
            <div class="fortune-body">${parsed.summary}</div>
          </div>
          <div class="fortune-grid">
            ${cats.map(c => `
            <div class="fortune-mini">
              <div class="mini-label">${c.label}</div>
              <div class="stars">${stars(parsed[c.key]?.score || 3)}</div>
              <div class="mini-text">${parsed[c.key]?.text || ''}</div>
            </div>`).join('')}
          </div>
          <div class="fortune-card">
            <div class="fortune-card-header">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              오늘의 조언
            </div>
            <div class="fortune-body">${parsed.advice}</div>
          </div>
          <div class="fortune-grid">
            <div class="fortune-mini">
              <div class="mini-label">행운의 색상</div>
              <div class="lucky-val">${parsed.luckyColor}</div>
            </div>
            <div class="fortune-mini">
              <div class="mini-label">행운의 숫자</div>
              <div class="lucky-val">${parsed.luckyNumber}</div>
            </div>
          </div>
        `;
      } catch(e) {
        document.getElementById('loading').style.display = 'none';
        showErr('오류: ' + e.message);
      }

      document.getElementById('btn-run').disabled = false;
    }
  </script>
</body>
</html>
